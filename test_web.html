<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player with Playlist & DID Button</title>
    <style>
        /* 화면 전체 레이아웃 (가운데 정렬) */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        /* 왼쪽 리스트와 오른쪽 플레이어를 가로로 배치하는 컨테이너 */
        .main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 왼쪽 영상 리스트 스타일 */
        .video-list {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            max-height: 400px;
            overflow-y: auto;
        }

        .video-list h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            color: #333;
        }

        .video-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .video-item:hover {
            background-color: #e9ecef;
        }

        .video-item.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
            font-weight: bold;
        }

        /* 오른쪽 플레이어 영역 스타일 */
        .player-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        video {
            width: 100%;
            max-width: 640px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #000;
        }

        /* 버튼들을 가로로 배치하기 위한 컨테이너 */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #postBtn {
            background-color: #007bff;
        }
        #postBtn:hover {
            background-color: #0056b3;
        }

        #didBtn {
            background-color: #28a745;
        }
        #didBtn:hover {
            background-color: #218838;
        }

        #didListBtn {
            background-color: #28a745;
        }
        #didListBtn:hover {
            background-color: #218838;
        }

        #apiResult {
            width: 100%;
            max-width: 640px;
            min-height: 120px;
            margin: 20px 0 0;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: white;
            color: #212529;
            font-size: 13px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="video-list" id="playlist">
        <h3>재생 목록</h3>
    </div>

    <div class="player-area">
        <video id="videoPlayer" controls autoplay muted>
            <source id="videoSource" src="" type="video/mp4">
            브라우저가 비디오 태그를 지원하지 않습니다.
        </video>

        <div class="btn-group">
            <button id="postBtn">토큰 전송하기</button>
            <button id="didBtn">DID 생성</button>
            <button id="didListBtn">DID 전부 출력</button>
        </div>
        <pre id="apiResult" aria-live="polite"></pre>
    </div>
</div>

<script src="test_script.js"></script>

</body>
</html>
